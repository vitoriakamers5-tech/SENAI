<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>✨ Margin e Padding — Estilo Criadora</h1>
<div class="primeiroquadrado">
    <p>💄 Padding: 30px — espaço interno</p>
    <p>O bloco rosa cresceu para dentro.</p>
</div>
<div class="segundoquadrado">
    <p>📱 Margin: 30px — espaço externo</p>
    <p>O bloco roxo se afastou dos outros.</p>
</div>
<div class="terceiroquadrado">
    <p>🌟 Margin: 20px + Padding: 20px</p>
    <p>Margin afasta por fora. Padding cresce por dentro.</p>
</div>
</body>
</html>
